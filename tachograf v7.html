<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tachograf FINAL ITD</title>
<style>
body{margin:0;background:#111;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh}
.tacho{width:420px;background:#000;border-radius:25px;box-shadow:0 0 40px #0f0;padding:15px;color:#0f0}
.screen{background:#020;border-radius:10px;padding:12px;text-align:center;box-shadow:inset 0 0 20px #0f0}
.buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.btn{border:2px solid #0f0;border-radius:50%;height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.logs{margin-top:10px;height:120px;overflow:auto;background:#000;padding:5px;font-size:11px}
.green{color:lime}
.red{color:red}
.orange{color:orange}
</style>
</head>
<body>
<div class="tacho">
<div class="screen">
<div id="time"></div>
<div>PRACA: <span id="work">00:00</span></div>
<div>JAZDA: <span id="drive">00:00</span></div>
<div id="breakStatus"></div>
<div id="restStatus"></div>
<div id="systemStatus"></div>
<div id="card" class="red">BRAK KARTY</div>
</div>

<div class="buttons">
<div class="btn" onclick="insertCard()">🪪</div>
<div class="btn" onclick="startDay()">▶</div>
<div class="btn" onclick="setMode('JAZDA')">🚚</div>
<div class="btn" onclick="setMode('PRACA')">🔧</div>
<div class="btn" onclick="setMode('PRZERWA')">☕</div>
<div class="btn" onclick="endDay()">⏹</div>
<div class="btn" onclick="showWeek()">📅</div>
<div class="btn" onclick="printWeek()">🖨</div>
<div class="btn" onclick="resetAll()">⟳</div>
</div>

<div class="logs" id="logs"></div>
</div>

<script>
let mode="";
let work=0,drive=0;
let breakTime=0;
let requiredBreaks=0,doneBreaks=0;
let logs=[];
let timer=null;
let card=false;
let restStart=null;

function updateClock(){document.getElementById("time").innerText=new Date().toLocaleString();}
setInterval(updateClock,1000);

function format(ms){let s=Math.floor(ms/1000);let h=Math.floor(s/3600);let m=Math.floor((s%3600)/60);return("0"+h).slice(-2)+":"+("0"+m).slice(-2);}

function insertCard(){card=true;document.getElementById("card").innerText="KARTA OK";document.getElementById("card").className="green";log("KARTA WLOZONA");updateSystem();}

function startDay(){if(!card){log("NARUSZENIE BRAK KARTY");updateSystem();return}
let w=prompt("Czas pracy hh:mm");let d=prompt("Czas jazdy hh:mm");
let workH=parseInt(w.split(":")[0]);let driveH=parseInt(d.split(":")[0]);
requiredBreaks=0;doneBreaks=0;
if(workH>6) requiredBreaks=1;
if(driveH>=6&&driveH<=8) requiredBreaks=2;
if(driveH>8) requiredBreaks=3;
updateBreakStatus();log("START DNIA | przerwy:"+requiredBreaks);
}

function updateBreakStatus(){let el=document.getElementById("breakStatus");
if(requiredBreaks===0){el.innerHTML="PRZERWY: BRAK";return}
if(doneBreaks===requiredBreaks){el.innerHTML="<span class='green'>PRZERWY OK "+doneBreaks+"/"+requiredBreaks+"</span>"}
else if(doneBreaks>0){el.innerHTML="<span class='orange'>PRZERWY "+doneBreaks+"/"+requiredBreaks+"</span>"}
else{el.innerHTML="<span class='red'>PRZERWY 0/"+requiredBreaks+"</span>"}
updateSystem();
}

function setMode(m){if(!card){log("NARUSZENIE BRAK KARTY");updateSystem();return}
mode=m;log("TRYB "+m);
if(timer) clearInterval(timer);

timer=setInterval(()=>{
if(mode==="JAZDA"){work+=1000;drive+=1000}
if(mode==="PRACA"){work+=1000}
if(mode==="PRZERWA"){work+=1000; breakTime+=1000; if(breakTime>=15*60000){breakTime=0;doneBreaks++;log("PRZERWA "+doneBreaks+"/"+requiredBreaks);updateBreakStatus();}}
updateDisplay();
},1000);
}

function updateDisplay(){document.getElementById("work").innerText=format(work);document.getElementById("drive").innerText=format(drive);}

function endDay(){log("KONIEC DNIA");restStart=Date.now();saveDay();updateSystem();}

function saveDay(){let week=JSON.parse(localStorage.getItem("week7")||"[]");
week.push({date:new Date().toLocaleDateString(),work,drive,requiredBreaks,doneBreaks});
while(week.length>7)week.shift();
localStorage.setItem("week7",JSON.stringify(week));}

function showWeek(){let week=JSON.parse(localStorage.getItem("week7")||"[]");let txt="";
week.forEach(d=>{txt+=d.date+" | PRACA:"+format(d.work)+" JAZDA:"+format(d.drive)+" PRZERWY:"+d.doneBreaks+"/"+d.requiredBreaks+"\n"});
alert(txt);}

function printWeek(){let week=JSON.parse(localStorage.getItem("week7")||"[]");let txt="";
week.forEach(d=>{txt+=d.date+"\n"+"PRACA:"+format(d.work)+" JAZDA:"+format(d.drive)+" PRZERWY:"+d.doneBreaks+"/"+d.requiredBreaks+"\n\n"});
let w=window.open();w.document.write("<pre>"+txt+"</pre>");w.print();}

function checkRest(){if(!restStart)return;let rest=Date.now()-restStart;
let el=document.getElementById("restStatus");
if(rest>=11*3600000){el.innerHTML="<span class='green'>ODPOCZYNEK OK</span>"}
else{el.innerHTML="<span class='red'>ODPOCZYNEK <11h</span>"}
updateSystem();}
setInterval(checkRest,5000);

function updateSystem(){let ok=true;
if(!card) ok=false;
if(requiredBreaks>0 && doneBreaks<requiredBreaks) ok=false;
let el=document.getElementById("systemStatus");
if(ok){el.innerHTML="<span class='green'>SYSTEM OK</span>"}
else{el.innerHTML="<span class='red'>SYSTEM NARUSZENIE</span>"}
}

function log(txt){let t=new Date().toLocaleTimeString();logs.push(t+" - "+txt);document.getElementById("logs").innerHTML=logs.join("<br>");}

function resetAll(){localStorage.clear();location.reload()}
</script>
</body>
</html>
