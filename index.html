<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriverTime City PRO 2.2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    background:#0a0a0a;
    font-family:'Courier New', monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#9CFF57;
}
.tacho{
    background:#111;
    border:6px solid #1c1c1c;
    border-radius:12px;
    padding:20px;
    width:95vw;
    max-width:1100px;
}
.display{
    background:#000;
    padding:15px;
    border-radius:6px;
    margin-bottom:10px;
}
.row{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
    font-size:18px;
}
.big{
    font-size:32px;
    text-align:center;
    margin:10px 0;
}
.buttons{
    display:flex;
    gap:6px;
    margin-bottom:8px;
}
button{
    flex:1;
    background:#1a1a1a;
    border:1px solid #333;
    color:#9CFF57;
    padding:10px;
    font-size:14px;
    border-radius:4px;
    cursor:pointer;
}
button.active{
    background:#003300;
    box-shadow:0 0 8px #00ff00;
}
.status{
    background:#000;
    padding:8px;
    border-radius:6px;
    margin-bottom:8px;
    font-size:13px;
    min-height:40px;
}
.ok{ color:#9CFF57; }
.bad{ color:#ff3b3b; }

.history{
    background:#000;
    padding:8px;
    border-radius:6px;
    max-height:200px;
    overflow-y:auto;
    font-size:12px;
}
.history div{
    border-bottom:1px solid #222;
    padding:4px 0;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="tacho">

<div class="display">
<div class="row">
<span id="clock">--:--</span>
<span>TRYB: <span id="mode">BRAK</span></span>
</div>

<div class="big" id="shiftTime">00:00:00</div>

<div class="row">
<span>🚍 JAZDA: <span id="driveTime">00:00</span></span>
<span>🛠 CZAS PRACY: <span id="workTime">00:00</span></span>
</div>
</div>

<div class="buttons">
    <button onclick="prevOption()">◀</button>
    <button id="selectedOption" style="flex:2">JAZDA</button>
    <button onclick="nextOption()">▶</button>
    <button onclick="confirmSelection()">✔ ZATWIERDŹ</button>
</div>

<div class="status" id="statusBox"></div>
<div id="breakInfo" style="font-size:13px;margin-bottom:6px;"></div>
<div class="history" id="history"></div>

</div>

<div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:999;">
    
    <div style="background:#111; padding:20px; border:2px solid #333; border-radius:8px; width:320px; color:#9CFF57;">

        <div style="margin-bottom:10px;">EDYCJA LOGU</div>

        <label>TRYB</label>
        <select id="editMode" style="width:100%; margin-bottom:10px;">
            <option>JAZDA</option>
            <option>INNA</option>
            <option>PRZERWA</option>
            <option>ODPOCZYNEK</option>
        </select>

        <label>START</label>
        <input id="editStart" type="datetime-local" style="width:100%; margin-bottom:10px;">

        <label>STOP</label>
        <input id="editEnd" type="datetime-local" style="width:100%; margin-bottom:15px;">

        <div style="display:flex; gap:6px;">
            <button onclick="saveEdit()">ZAPISZ</button>
            <button onclick="deleteLog()" style="background:#330000;">USUŃ</button>
            <button onclick="closeEdit()">ANULUJ</button>
        </div>

    </div>
</div>

<script>

let segments = JSON.parse(localStorage.getItem("segments")) || [];
let activeSegment = JSON.parse(localStorage.getItem("activeSegment")) || null;

let currentMode=null;
let segmentStart=null;
let shiftStart=null;
let timerInterval=null;

let options = [
    "JAZDA",
    "INNA",
    "PRZERWA",
    "ODPOCZYNEK",
    "RESET DNIA",
    "RESET CAŁOŚCI",
    "EXPORT PDF"
];

let selectedIndex = 0;
let editIndex = null;

if(activeSegment){
    currentMode=activeSegment.mode;
    segmentStart=activeSegment.start;
    shiftStart=activeSegment.shiftStart;
    document.getElementById("mode").innerText=currentMode;
    
    startTimer();
}

renderHistory();

function changeMode(newMode){
    const now=Date.now();

    if(currentMode){
        segments.push({mode:currentMode,start:segmentStart,end:now});
    }

    if(segments.length>0){
        const last=segments[segments.length-1];
        if(last.mode==="ODPOCZYNEK" && last.end-last.start>=11*60*60*1000){
            shiftStart=now;
        }
    }

    if(!shiftStart) shiftStart=now;

    currentMode=newMode;
    segmentStart=now;

    localStorage.setItem("activeSegment",JSON.stringify({
        mode:newMode,start:segmentStart,shiftStart:shiftStart
    }));

    localStorage.setItem("segments",JSON.stringify(segments));

    document.getElementById("mode").innerText=newMode;
   
    renderHistory();
    startTimer();
}

function startTimer(){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(updateDisplay,1000);
}

function updateDisplay(){
    const now=Date.now();
    const t=new Date();

    document.getElementById("clock").innerText=
        pad(t.getHours())+":"+pad(t.getMinutes());

    if(!shiftStart) return;

    const shiftMs=now-shiftStart;
    document.getElementById("shiftTime").innerText=formatFull(shiftMs);

    const analysis = analyzeDay();
    document.getElementById("driveTime").innerText=formatShort(analysis.driveMs);
    document.getElementById("workTime").innerText=formatShort(analysis.workMs);

    renderStatus(analysis);
}

function analyzeDay(){

    const now=Date.now();
    let drive=0, work=0, breaks=0;

    segments.forEach(s=>{
        if(s.start < shiftStart) return;
        const d=s.end-s.start;

        if(s.mode==="JAZDA") drive+=d;

        // 🔥 PRZERWA TERAZ WLICZANA DO CZASU PRACY
        if(s.mode==="JAZDA"||s.mode==="INNA"||s.mode==="PRZERWA") work+=d;

        if(s.mode==="PRZERWA" && d >= 15*60*1000)
    breaks += d;
    });

    if(currentMode && segmentStart>=shiftStart){
        const d=now-segmentStart;

        if(currentMode==="JAZDA") drive+=d;

        if(currentMode==="JAZDA"||currentMode==="INNA"||currentMode==="PRZERWA") work+=d;

        if(currentMode==="PRZERWA" && d >= 15*60*1000)
    breaks += d;
    }

    let violations=[];

    if(work>12*60*60*1000) violations.push("PRZEKROCZENIE 12H CZASU PRACY");
    if(work>=6*60*60*1000 && breaks<15*60*1000)
        violations.push("BRAK 15 MIN PRZERWY (ART 31b)");
    if(work>8*60*60*1000 && breaks<30*60*1000)
        violations.push("BRAK 30 MIN PRZERWY (ART 31b)");

    if(drive>=6*60*60*1000 && drive<=8*60*60*1000 && breaks<30*60*1000)
        violations.push("BRAK 30 MIN PRZERWY (JAZDA)");
    if(drive>8*60*60*1000 && breaks<45*60*1000)
        violations.push("BRAK 45 MIN PRZERWY (JAZDA)");

    return {driveMs:drive, workMs:work, violations};
}

function renderStatus(a){
    const box=document.getElementById("statusBox");
    box.innerHTML="";
    if(a.violations.length===0){
        box.className="status ok";
        box.innerText="STATUS: OK";
    } else {
        box.className="status bad";
        box.innerHTML="STATUS: NARUSZENIE<br>"+a.violations.join("<br>");
    }
renderBreakInfo(a);
}

function renderBreakInfo(a){

    const box = document.getElementById("breakInfo");

    let requiredBreak = 0;
    let reason = "";

    // 31b – czas pracy
    if(a.workMs >= 6*60*60*1000){
        requiredBreak = 15;
        reason = "CZAS PRACY > 6H";
    }

    // jazda 6–8h
    if(a.driveMs >= 6*60*60*1000 && a.driveMs <= 8*60*60*1000){
        requiredBreak = 30;
        reason = "JAZDA 6–8H";
    }

    // jazda >8h
    if(a.driveMs > 8*60*60*1000){
        requiredBreak = 45;
        reason = "JAZDA >8H";
    }

    if(requiredBreak === 0){
        box.innerHTML="";
        return;
    }

    // obliczamy realnie odbyta przerwe
    let breakMs = 0;
    segments.forEach(s=>{

    if(s.mode==="PRZERWA" && s.start >= shiftStart){

        const d = s.end - s.start;

        if(d >= 15*60*1000){
            breakMs += d;
        }

    }

});

   if(currentMode==="PRZERWA" && segmentStart>=shiftStart){

    const d = Date.now() - segmentStart;

    if(d >= 15*60*1000){
        breakMs += d;
    }

}

    const doneMin = Math.floor(breakMs/60000);

    if(doneMin >= requiredBreak){
        box.style.color = "#00ff00";
        box.innerHTML = 
            "✔ WYMAGANA PRZERWA " + requiredBreak + 
            " MIN ("+reason+") – SPEŁNIONA ("+doneMin+" MIN)";
    }else{
        box.style.color = "#ff3b3b";
        box.innerHTML = 
            "✖ WYMAGANA PRZERWA " + requiredBreak + 
            " MIN ("+reason+") – BRAKUJE " + 
            (requiredBreak-doneMin) + " MIN";
    }
}

function resetDay(){
    if(confirm("Rozpocząć nowy dzień?")){
        shiftStart=Date.now();
        localStorage.removeItem("activeSegment");
        currentMode=null;
        segmentStart=null;
        document.getElementById("mode").innerText="BRAK";
    }
}

function resetAll(){
    if(confirm("Wyzerować cały tachograf?")){
        localStorage.clear();
        location.reload();
    }
}

function exportPDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(14);
    doc.text("DriverTime City PRO – Raport dnia pracy",10,10);

    doc.setFontSize(10);

    let y = 20;

    const daySegments = segments.filter(s => s.start >= shiftStart);

    daySegments.forEach(s=>{

        const start = new Date(s.start).toLocaleTimeString();
        const end = new Date(s.end).toLocaleTimeString();

        const duration = Math.floor((s.end - s.start)/60000);

        const line =
            s.mode +
            " | " + start +
            " - " + end +
            " | " + duration + " min";

        doc.text(line,10,y);

        y += 6;

        if(y > 280){
            doc.addPage();
            y = 10;
        }

    });

    const analysis = analyzeDay();

    y += 10;

    doc.text("Podsumowanie:",10,y);
    y += 6;

    doc.text("Czas jazdy: " + formatShort(analysis.driveMs),10,y);
    y += 6;

    doc.text("Czas pracy: " + formatShort(analysis.workMs),10,y);
    y += 6;

    if(analysis.violations.length > 0){

        doc.text("Naruszenia:",10,y);
        y += 6;

        analysis.violations.forEach(v=>{
            doc.text("- " + v,10,y);
            y += 6;
        });

    }else{

        doc.text("Brak naruszeń",10,y);

    }

    doc.save("DriverTime_dzien_pracy.pdf");
}

function renderHistory(){
    const h=document.getElementById("history");
    h.innerHTML="";

    segments.slice().reverse().forEach((s,i)=>{

        const realIndex = segments.length - 1 - i;

        const div=document.createElement("div");
        div.innerText=
            s.mode+" | "+
            new Date(s.start).toLocaleString()+
            " - "+new Date(s.end).toLocaleTimeString();

        div.onclick=function(){
    openEdit(realIndex);
};

        h.appendChild(div);
    });
}



 


function formatFull(ms){
    const s=Math.floor(ms/1000);
    return pad(Math.floor(s/3600))+":"+
           pad(Math.floor((s%3600)/60))+":"+
           pad(s%60);
}
function formatShort(ms){
    const s=Math.floor(ms/1000);
    return pad(Math.floor(s/3600))+":"+
           pad(Math.floor((s%3600)/60));
}
function pad(n){return String(n).padStart(2,'0');}
function updateSelectorDisplay(){
    document.getElementById("selectedOption").innerText =
        options[selectedIndex];
}

function prevOption(){
    selectedIndex--;
    if(selectedIndex < 0) selectedIndex = options.length-1;
    updateSelectorDisplay();
}

function confirmSelection(){

    const selected = options[selectedIndex];

    if(selected === "RESET DNIA"){
        resetDay();
        return;
    }

    if(selected === "RESET CAŁOŚCI"){
        resetAll();
        return;
    }

    if(selected === "EXPORT PDF"){
        exportPDF();
        return;
    }

    changeMode(selected);
}

function nextOption(){
    selectedIndex++;
    if(selectedIndex >= options.length) selectedIndex = 0;
    updateSelectorDisplay();
}

function openEdit(index){

    editIndex = index;

    const seg = segments[index];

    document.getElementById("editMode").value = seg.mode;

    document.getElementById("editStart").value =
        new Date(seg.start).toISOString().slice(0,16);

    document.getElementById("editEnd").value =
        new Date(seg.end).toISOString().slice(0,16);

    document.getElementById("editModal").style.display="flex";
}


function closeEdit(){

    document.getElementById("editModal").style.display="none";

    editIndex = null;
}


function saveEdit(){

    if(editIndex===null) return;

    const mode = document.getElementById("editMode").value;

    const start = new Date(
        document.getElementById("editStart").value
    ).getTime();

    const end = new Date(
        document.getElementById("editEnd").value
    ).getTime();

    if(end <= start){
        alert("STOP musi być później niż START");
        return;
    }

    segments[editIndex] = {
        mode:mode,
        start:start,
        end:end
    };

    localStorage.setItem("segments",JSON.stringify(segments));

    closeEdit();

    renderHistory();
    updateDisplay();
}


function deleteLog(){

    if(editIndex===null) return;

    if(confirm("Usunąć ten log?")){

        segments.splice(editIndex,1);

        localStorage.setItem("segments",JSON.stringify(segments));

        closeEdit();

        renderHistory();
        updateDisplay();
    }
}

updateSelectorDisplay();
</script>
</body>
</html>
